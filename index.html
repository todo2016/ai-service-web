<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevKit App - 开发工具集合</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; padding: 60px 0; }
    .header h1 { font-size: 48px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .header p { color: #888; font-size: 18px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
    .card { background: #1a1a3e; border-radius: 16px; padding: 30px; transition: transform 0.3s; }
    .card:hover { transform: translateY(-5px); }
    .card-icon { font-size: 48px; margin-bottom: 15px; }
    .card-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    .card-desc { color: #888; font-size: 14px; margin-bottom: 15px; }
    .card-link { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 8px; font-size: 14px; }
    .footer { text-align: center; padding: 40px; color: #666; font-size: 14px; }
    .sub { max-width: 600px; margin: 0 auto; text-align: center; }
    .sub h2 { font-size: 24px; margin-bottom: 15px; }
    .sub-links { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
    .sub-link { padding: 12px 24px; background: #1a1a3e; border-radius: 8px; color: #667eea; text-decoration: none; }
    .sub-link:hover { background: #2a2a4e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DevKit App</h1>
      <p>开发工具集合 - 让开发更简单</p>
    </div>

    <div class="sub">

      <div class="sub-links">
        <a href="https://47.120.79.108:3006" class="sub-link">📷 条码查询</a>
        <a href="https://47.120.79.108:3008" class="sub-link">🏷️ 今日特价</a>
        <a href="https://47.120.79.108:3009" class="sub-link">📚 条码知识</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-icon">📷</div>
        <div class="card-title">条码查询</div>
        <div class="card-desc">扫码查价格，全网比价省钱</div>
        <a href="https://47.120.79.108:3006" class="card-link">立即使用</a>
      </div>
      <div class="card">
        <div class="card-icon">🏷️</div>
        <div class="card-title">今日特价</div>
        <div class="card-desc">精选优惠商品，省钱购物</div>
        <a href="https://47.120.79.108:3008" class="card-link">查看特价</a>
      </div>
      <div class="card">
        <div class="card-icon">🤖</div>
        <div class="card-title">AI 创作</div>
        <div class="card-desc">AI绘画、音乐、语音合成</div>
        <a href="https://47.120.79.108:8000" class="card-link">开始创作</a>
      </div>
      <div class="card">
        <div class="card-icon">📚</div>
        <div class="card-title">条码知识</div>
        <div class="card-desc">了解条码查询相关知识</div>
        <a href="https://47.120.79.108:3009" class="card-link">阅读更多</a>
      </div>
    </div>

    <div class="footer">
      <p>DevKit App © 2024</p>
      <p style="margin-top:10px;">让开发更简单 · 让生活更便利</p>
    </div>
  </div>
</body>
</html>
